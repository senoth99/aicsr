<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — AI Agents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <div class="screen screen-login">
      <div class="login-card">
        <div class="login-logo-wrap" aria-hidden="true">
          <svg class="logo-svg logo-svg--static" viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a4d2e" />
                <stop offset="50%" stop-color="#3E8E41" />
                <stop offset="100%" stop-color="#A3D9A5" />
              </linearGradient>
            </defs>
            <rect x="4" y="8" width="112" height="32" fill="none" stroke="url(#lg1)" stroke-width="1.5" />
            <path d="M60 4v40M52 8h16M52 40h16" stroke="url(#lg1)" stroke-width="1.2" fill="none" />
            <rect x="24" y="16" width="72" height="16" fill="url(#lg1)" opacity="0.35" />
          </svg>
        </div>
        <p class="login-label">ВХОД</p>
        <input
          id="login-password"
          type="password"
          class="input input-block"
          placeholder="Пароль"
          maxlength="64"
          autocomplete="current-password"
        />
        <button type="button" id="login-submit" class="btn btn-primary btn-block">ВОЙТИ</button>
        <p id="login-error" class="login-error" hidden>Неверный пароль</p>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
