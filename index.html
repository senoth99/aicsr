<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="js/config.defaults.js"></script>
    <script src="/api/client-config.js"></script>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <div id="screen-app" class="screen screen-app">
      <div class="subbar">
        <div id="subbar-agents" class="subbar-inner">
          <span class="subbar-label">АКТИВНЫЙ АГЕНТ</span>
          <div id="agent-tabs" class="agent-tabs" role="tablist" aria-label="Агенты"></div>
        </div>
      </div>

      <main class="main">
        <section id="panel-agents" class="panel">
          <div class="panel-grid">
            <div class="card card-chat tg-chat">
              <div class="card-head tg-chat-head">
                <span class="card-kicker">Чат</span>
                <span id="chat-agent-name" class="card-title-inline"></span>
              </div>
              <div id="chat-messages" class="chat-messages tg-chat-messages" role="log" aria-live="polite"></div>
              <div class="chat-compose tg-chat-compose">
                <textarea
                  id="chat-input"
                  class="input input-chat tg-chat-input"
                  rows="1"
                  placeholder="Сообщение"
                ></textarea>
                <button type="button" id="chat-send" class="btn btn-primary tg-chat-send" aria-label="Отправить">
                  <svg class="tg-send-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
